<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Africa Growth Fund · Five Years · Timeline</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">

<style>
/* ============================================================
   FUND PARTNER MEETING - FIVE-YEAR TIMELINE
   Scroll-snap page, one section per year, one animation style
   per year. Energy builds from archival hush (2022) to present
   mosaic (2026).

   Section style map
     2022  hero-crossfade   quiet archive, one frame at a time
     2023  marquee-rows     horizontal bands, momentum
     2024  ticker-columns   vertical drift, multiplying activity
     2025  scatter-drift    expansive polaroid field
     2026  mosaic-breathe   cinematic present-tense grid

   Type: Poppins (Fund web standard) + JetBrains Mono (data).
   ============================================================ */

:root {
    --bg-deep:   #0F2620;
    --bg-ground: #0A1A15;
    --cream:     #F5EFE2;
    --cream-dim: rgba(245, 239, 226, 0.70);
    --cream-faint: rgba(245, 239, 226, 0.22);

    --fund-green: #00C46A;
    --fund-gold:  #FFC72C;
    --fund-green-soft: #2E5D4F;

    --font-body: 'Poppins', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;

    --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --radius: 10px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    height: 100%;
    background: var(--bg-ground);
    color: var(--cream);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

html {
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
}

body {
    overflow-x: hidden;
}

/* ===========================================
   YEAR SECTION - shared shell
   =========================================== */
.year {
    position: relative;
    width: 100vw;
    height: 100vh;
    scroll-snap-align: start;
    overflow: hidden;
    isolation: isolate;
}

.year-stage {
    position: absolute;
    inset: 0;
    z-index: 1;
}

.year-overlay {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    background:
        linear-gradient(180deg,
            rgba(10, 26, 21, 0.48) 0%,
            rgba(10, 26, 21, 0.04) 16%,
            rgba(10, 26, 21, 0.04) 82%,
            rgba(10, 26, 21, 0.66) 100%);
}

.year-hero {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    padding: clamp(2rem, 4vh, 4rem) clamp(2rem, 5vw, 6rem);
    pointer-events: none;
}

.year-center {
    align-self: end;
    justify-self: start;
    max-width: min(960px, 88vw);
    padding: clamp(1.5rem, 2.6vh, 2.4rem) clamp(1.75rem, 2.8vw, 2.8rem) clamp(1.75rem, 2.9vh, 2.6rem);
    background: rgba(10, 26, 21, 0.22);
    backdrop-filter: blur(18px) saturate(1.15);
    -webkit-backdrop-filter: blur(18px) saturate(1.15);
    border: 1px solid rgba(245, 239, 226, 0.10);
    border-radius: clamp(12px, 1vw, 18px);
    box-shadow:
        0 8px 28px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(245, 239, 226, 0.06);
}

.year-digit {
    font-family: var(--font-body);
    font-weight: 200;
    font-size: clamp(2.75rem, 8.5vw, 8rem);
    line-height: 0.9;
    letter-spacing: -0.04em;
    color: var(--cream);
    text-shadow: 0 2px 24px rgba(10, 26, 21, 0.55);
}
/* Progressive weight: earlier years thinner, later years bolder */
.year[data-index="0"] .year-digit { font-weight: 200; }
.year[data-index="1"] .year-digit { font-weight: 300; }
.year[data-index="2"] .year-digit { font-weight: 400; }
.year[data-index="3"] .year-digit { font-weight: 600; }
.year[data-index="4"] .year-digit { font-weight: 800; }

.year-title {
    display: block;
    margin-top: clamp(0.35rem, 0.8vh, 0.8rem);
    font-size: clamp(1.25rem, 2.5vw, 2.35rem);
    font-weight: 500;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--cream);
    text-shadow: 0 1px 14px rgba(10, 26, 21, 0.45);
}
.year-title em { color: var(--fund-green); font-style: italic; font-weight: 500; }

.year-caption {
    margin-top: clamp(0.6rem, 1.1vh, 1rem);
    font-size: clamp(0.82rem, 0.98vw, 0.98rem);
    color: var(--cream-dim);
    max-width: 54ch;
    line-height: 1.5;
    text-shadow: 0 1px 10px rgba(10, 26, 21, 0.4);
}

.year-bullets {
    margin-top: clamp(1.2rem, 2.2vh, 1.8rem);
    list-style: none;
    display: grid;
    gap: clamp(1rem, 1.8vh, 1.6rem);
    max-width: 44ch;
    font-family: var(--font-body);
    font-size: clamp(1.7rem, 2.4vw, 2.6rem);
    font-weight: 400;
    color: var(--cream);
    line-height: 1.4;
}
.year-bullets li {
    position: relative;
    padding-left: 2rem;
    text-shadow: 0 1px 10px rgba(10, 26, 21, 0.45);
}
.year-bullets li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.65em;
    width: 18px;
    height: 3px;
    background: var(--fund-gold);
}
.year-bullets li strong {
    color: var(--fund-green);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
}

.demo-badge {
    position: absolute;
    top: clamp(1rem, 2.5vh, 2rem);
    left: 50%;
    transform: translateX(-50%);
    z-index: 12;
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.3rem 0.7rem;
    border: 1px solid var(--fund-gold);
    border-radius: 999px;
    color: var(--fund-gold);
    background: rgba(10, 26, 21, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
}

/* ===========================================
   STYLE 1 - archive-drift (2022)
   Dense static collage with archival grayscale+sepia wash.
   The whole plane slowly pans and zooms - the feel of
   lingering over a photo album rather than flipping pages.
   =========================================== */
.archive-drift {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: #0A1A15;
}
.archive-plane {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-auto-rows: minmax(clamp(120px, 14vh, 200px), 1fr);
    gap: clamp(6px, 0.6vw, 12px);
    padding: clamp(6px, 0.6vw, 12px);
    animation: archiveDrift 54s ease-in-out infinite alternate;
    animation-play-state: paused;
    will-change: transform;
    transform-origin: 42% 48%;
    grid-auto-flow: dense;
    align-content: start;
}
.year.active .archive-plane { animation-play-state: running; }
@keyframes archiveDrift {
    0%   { transform: scale(1.04) translate(0%, 0%); }
    50%  { transform: scale(1.10) translate(-2%, -1.5%); }
    100% { transform: scale(1.04) translate(-4%, -3%); }
}
.archive-tile {
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    background: #1A3A30;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
}
/* Span rules removed — they could leave grid gaps at 2022's size.
   Uniform cells guarantee edge-to-edge coverage. */
.archive-tile img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(1.03) contrast(1.02);
}
@media (max-width: 1200px) {
    .archive-plane { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 720px) {
    .archive-plane { grid-template-columns: repeat(3, 1fr); }
}

/* ===========================================
   STYLE 2 - marquee-rows (2023)
   Three horizontal rows, alternating direction + speed.
   =========================================== */
.marquee-rows {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    gap: clamp(12px, 1.4vw, 24px);
    padding: clamp(12px, 1.4vw, 24px) 0;
    justify-content: center;
    background:
        radial-gradient(ellipse at 0% 50%, rgba(0, 196, 106, 0.10), transparent 55%),
        radial-gradient(ellipse at 100% 50%, rgba(255, 199, 44, 0.08), transparent 55%),
        var(--bg-deep);
}
.marquee-row {
    display: flex;
    gap: clamp(12px, 1.4vw, 24px);
    will-change: transform;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    animation-play-state: paused;
    flex-shrink: 0;
}
.year.active .marquee-row { animation-play-state: running; }

.marquee-row.r1 { animation: marqueeLeft  42s linear infinite; }
.marquee-row.r2 { animation: marqueeRight 52s linear infinite; }
.marquee-row.r3 { animation: marqueeLeft  34s linear infinite; }

@keyframes marqueeLeft  { from { transform: translateX(0); }     to { transform: translateX(-50%); } }
@keyframes marqueeRight { from { transform: translateX(-50%); }  to { transform: translateX(0); } }

.marquee-tile {
    flex: 0 0 auto;
    width: clamp(180px, 22vw, 360px);
    aspect-ratio: 3 / 2;
    border-radius: var(--radius);
    overflow: hidden;
    background: #1A3A30;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
}
.marquee-tile:nth-child(5n) { aspect-ratio: 4 / 5; width: clamp(150px, 18vw, 280px); }
.marquee-tile img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    filter: saturate(1.05) contrast(1.03);
}

/* ===========================================
   STYLE 3 - ticker-columns (2024)
   Six vertical columns, alternating direction + speed.
   =========================================== */
.ticker-columns {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: clamp(10px, 1vw, 18px);
    padding: clamp(10px, 1vw, 18px);
    background:
        radial-gradient(ellipse at 20% 0%, rgba(0, 196, 106, 0.10), transparent 55%),
        radial-gradient(ellipse at 80% 100%, rgba(255, 199, 44, 0.08), transparent 55%),
        linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-ground) 100%);
}
.ticker-col {
    display: flex;
    flex-direction: column;
    gap: clamp(10px, 1vw, 18px);
    will-change: transform;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    animation-play-state: paused;
}
.year.active .ticker-col { animation-play-state: running; }

.ticker-col:nth-child(1) { animation: driftUp  280s linear infinite; animation-delay:   0s; }
.ticker-col:nth-child(2) { animation: driftDown 240s linear infinite; animation-delay: -32s; }
.ticker-col:nth-child(3) { animation: driftUp  220s linear infinite; animation-delay: -64s; }
.ticker-col:nth-child(4) { animation: driftDown 230s linear infinite; animation-delay: -18s; }
.ticker-col:nth-child(5) { animation: driftUp  250s linear infinite; animation-delay: -48s; }
.ticker-col:nth-child(6) { animation: driftDown 290s linear infinite; animation-delay: -82s; }

@keyframes driftUp   { from { transform: translateY(0); }    to { transform: translateY(-50%); } }
@keyframes driftDown { from { transform: translateY(-50%); } to { transform: translateY(0); } }

.ticker-tile {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 2;
    border-radius: var(--radius);
    overflow: hidden;
    background: #1A3A30;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
}
.ticker-tile:nth-child(3n) { aspect-ratio: 3 / 4; }
.ticker-tile:nth-child(7n) { aspect-ratio: 1 / 1; }
.ticker-tile img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    filter: saturate(1.03) contrast(1.02);
}

/* ===========================================
   STYLE 4 - triptych-crossfade (2025)
   Three tall editorial panels side-by-side. Each panel
   independently cycles through the image pool at its own
   cadence so the screen never settles. Reads as "three
   windows onto the work" - expansion without chaos.
   =========================================== */
.triptych-crossfade {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: clamp(4px, 0.5vw, 10px);
    padding: clamp(4px, 0.5vw, 10px);
    background: var(--bg-deep);
}
.triptych-panel {
    position: relative;
    overflow: hidden;
    background: #1A3A30;
    border-radius: 6px;
}
.triptych-panel .frame {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 2.4s var(--ease-expo);
    transform: scale(1.02);
    will-change: opacity, transform;
    filter: saturate(1.05) contrast(1.03);
}
.triptych-panel .frame.visible {
    opacity: 1;
    animation: triptychKenBurns 11s ease-out forwards;
    animation-play-state: paused;
}
.year.active .triptych-panel .frame.visible { animation-play-state: running; }
@keyframes triptychKenBurns {
    from { transform: scale(1.02); }
    to   { transform: scale(1.14); }
}
@media (max-width: 720px) {
    .triptych-crossfade { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr 1fr; }
}

/* ===========================================
   STYLE 5 - mosaic-breathe (2026)
   Grid mosaic, each cell Ken Burns + staggered crossfade.
   =========================================== */
.mosaic-breathe {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(clamp(160px, 14vw, 260px), 1fr));
    grid-auto-rows: clamp(140px, 14vw, 240px);
    gap: clamp(4px, 0.6vw, 10px);
    padding: clamp(4px, 0.6vw, 10px);
    background: var(--bg-deep);
    grid-auto-flow: dense;
    align-content: start;
}
.mosaic-cell {
    position: relative;
    overflow: hidden;
    background: #1A3A30;
    border-radius: 4px;
}
.mosaic-cell .frame {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transform: scale(1.0);
    transition: opacity 1.6s var(--ease-expo);
    will-change: opacity, transform;
    filter: saturate(1.03) contrast(1.02);
}
.mosaic-cell .frame.visible {
    opacity: 1;
    animation: mosaicBreathe 12s ease-in-out infinite;
    animation-play-state: paused;
}
.year.active .mosaic-cell .frame.visible { animation-play-state: running; }
@keyframes mosaicBreathe {
    0%, 100% { transform: scale(1.0); }
    50%      { transform: scale(1.08); }
}
/* Span variation for visual rhythm */
.mosaic-cell:nth-child(7n)  { grid-row: span 2; }
.mosaic-cell:nth-child(11n) { grid-column: span 2; }
.mosaic-cell:nth-child(17n) { grid-row: span 2; grid-column: span 2; }

/* ===========================================
   CODA - textless ambient forever-loop
   Dense 8-column ticker pulling every image from every
   year folder. Always runs (never paused by IO). No text,
   no badges, no lockups. Built for ambient room display.
   =========================================== */
.year.coda .year-overlay,
.year.coda .year-hero,
.year.coda .thread { display: none; }

.ticker-forever {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: clamp(6px, 0.6vw, 12px);
    padding: clamp(6px, 0.6vw, 12px);
    background:
        radial-gradient(ellipse at 15% 0%, rgba(0, 196, 106, 0.08), transparent 55%),
        radial-gradient(ellipse at 85% 100%, rgba(255, 199, 44, 0.06), transparent 55%),
        var(--bg-ground);
}
.forever-col {
    display: flex;
    flex-direction: column;
    gap: clamp(6px, 0.6vw, 12px);
    will-change: transform;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
}
.forever-col:nth-child(1) { animation: driftUp  600s linear infinite; animation-delay:    0s; }
.forever-col:nth-child(2) { animation: driftDown 640s linear infinite; animation-delay:  -85s; }
.forever-col:nth-child(3) { animation: driftUp  560s linear infinite; animation-delay: -170s; }
.forever-col:nth-child(4) { animation: driftDown 620s linear infinite; animation-delay:  -38s; }
.forever-col:nth-child(5) { animation: driftUp  580s linear infinite; animation-delay: -255s; }
.forever-col:nth-child(6) { animation: driftDown 680s linear infinite; animation-delay:  -72s; }
.forever-col:nth-child(7) { animation: driftUp  610s linear infinite; animation-delay: -140s; }
.forever-col:nth-child(8) { animation: driftDown 650s linear infinite; animation-delay: -220s; }

.forever-tile {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 2;
    border-radius: 8px;
    overflow: hidden;
    background: #1A3A30;
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
}
.forever-tile:nth-child(3n) { aspect-ratio: 3 / 4; }
.forever-tile:nth-child(7n) { aspect-ratio: 1 / 1; }
.forever-tile:nth-child(13n) { aspect-ratio: 4 / 3; }
.forever-tile img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    filter: saturate(1.04) contrast(1.02);
}

/* ===========================================
   SIDE NAV - year dots
   =========================================== */
.nav {
    position: fixed;
    right: clamp(1rem, 2vw, 2rem);
    top: 50%;
    transform: translateY(-50%);
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: var(--cream-dim);
}
.nav a {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    color: var(--cream-dim);
    text-decoration: none;
    opacity: 0.55;
    transition: opacity 0.25s ease, color 0.25s ease;
}
.nav a::after {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--cream-faint);
    border: 1px solid var(--cream-dim);
    transition: background 0.25s ease, transform 0.25s ease;
}
.nav a.active { opacity: 1; color: var(--cream); }
.nav a.active::after { background: var(--fund-green); transform: scale(1.3); }

/* ===========================================
   CONTROLS
   =========================================== */
.controls {
    position: fixed;
    bottom: clamp(1rem, 2vh, 1.75rem);
    left: 50%;
    transform: translateX(-50%);
    z-index: 51;
    display: flex;
    gap: 0.75rem;
    padding: 0.5rem 0.9rem;
    background: rgba(10, 26, 21, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(245, 239, 226, 0.12);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cream-dim);
    opacity: 0.08;
    transition: opacity 0.5s ease;
}
.controls:hover { opacity: 0.9; }
.controls kbd {
    font-family: var(--font-mono);
    background: rgba(245, 239, 226, 0.08);
    border: 1px solid rgba(245, 239, 226, 0.15);
    border-radius: 4px;
    padding: 0.1rem 0.4rem;
    color: var(--cream);
    font-size: 0.62rem;
}

/* ===========================================
   BREAK TIMER
   Top-right button opens a modal where the user sets
   break length in minutes. After start, a large
   countdown sits in the bottom-right corner.
   =========================================== */
.timer-button {
    position: fixed;
    top: clamp(1rem, 2vh, 1.75rem);
    right: clamp(1rem, 2vw, 1.75rem);
    z-index: 52;
    padding: 0.55rem 1rem;
    background: rgba(10, 26, 21, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(245, 239, 226, 0.12);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 0.66rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cream);
    cursor: pointer;
    opacity: 0.85;
    transition: opacity 0.3s ease, color 0.2s ease, border-color 0.2s ease;
}
.timer-button:hover {
    opacity: 1;
    border-color: var(--fund-gold);
    color: var(--fund-gold);
}
/* Dim the button once the show is running so it doesn't compete
   with the animation. Hover still brings it back to full. */
body:not(.paused) .timer-button {
    opacity: 0.2;
}
body:not(.paused) .timer-button:hover {
    opacity: 0.95;
}

.timer-modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10, 26, 21, 0.72);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}
.timer-modal.active { opacity: 1; pointer-events: auto; }
.timer-modal-inner {
    padding: clamp(1.5rem, 3vh, 2.25rem) clamp(1.5rem, 3vw, 2.25rem);
    background: rgba(15, 38, 32, 0.9);
    backdrop-filter: blur(24px) saturate(1.2);
    -webkit-backdrop-filter: blur(24px) saturate(1.2);
    border: 1px solid rgba(245, 239, 226, 0.18);
    border-radius: 18px;
    min-width: min(440px, 90vw);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
    color: var(--cream);
}
.timer-modal-sub {
    font-family: var(--font-mono);
    font-size: 0.64rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fund-gold);
    margin-bottom: 0.5rem;
}
.timer-modal-title {
    font-family: var(--font-body);
    font-size: 1.35rem;
    font-weight: 600;
    margin-bottom: 1.4rem;
    letter-spacing: -0.015em;
}
.timer-inputs {
    display: flex;
    align-items: baseline;
    gap: 0.7rem;
    margin-bottom: 1rem;
}

.timer-inputs span {

    letter-spacing: 0.14em;

.timer-quick {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;

}
.timer-quick button {
    padding: 0.45rem 0.85rem;

    font-size: 0.72rem;
    font-weight: 500;
    background: rgba(245, 239, 226, 0.06);
    border: 1px solid rgba(245, 239, 226, 0.14);
    border-radius: 999px;
    color: var(--cream-dim);
    cursor: pointer;
    transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
}
.timer-quick button:hover {
    color: var(--cream);
    border-color: var(--fund-gold);
    background: rgba(255, 199, 44, 0.08);
}
.timer-actions {
    display: flex;
    gap: 0.7rem;
    justify-content: flex-end;
}
.timer-actions button {
    padding: 0.7rem 1.5rem;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    border-radius: 999px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: opacity 0.15s ease, background 0.15s ease, color 0.15s ease;
}
.timer-primary { background: var(--fund-green); color: var(--bg-ground); }
.timer-primary:hover { opacity: 0.88; }
.timer-secondary {
    background: transparent;
    border-color: rgba(245, 239, 226, 0.2);
    color: var(--cream-dim);
}
.timer-secondary:hover { color: var(--cream); }

.timer-display {
    position: fixed;
    bottom: clamp(1.25rem, 2.5vh, 2.25rem);
    right: clamp(1.25rem, 2.5vw, 2.25rem);
    z-index: 53;
    display: flex;
    align-items: center;
    gap: clamp(0.6rem, 1vw, 1rem);
    padding: clamp(0.9rem, 1.6vh, 1.4rem) clamp(1.2rem, 2.2vw, 1.9rem);
    background: rgba(10, 26, 21, 0.62);
    backdrop-filter: blur(18px) saturate(1.15);
    -webkit-backdrop-filter: blur(18px) saturate(1.15);
    border: 1px solid rgba(245, 239, 226, 0.14);
    border-radius: 20px;
    box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);

    pointer-events: none;

.timer-display.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
.timer-digits {
    font-family: var(--font-mono);
    font-size: clamp(3.5rem, 7vw, 6.5rem);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--cream);
    line-height: 1;
    letter-spacing: -0.02em;
    min-width: 4.2ch;
    text-align: center;
    transition: color 0.3s ease;
}
.timer-digits.warning { color: var(--fund-gold); }
.timer-digits.alert {
    color: var(--fund-green);
    animation: timerPulse 1s ease-in-out infinite;
}
.timer-digits.done {
    color: var(--fund-green);
    animation: timerFlash 0.8s ease-in-out infinite;
}
@keyframes timerPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
@keyframes timerFlash { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.05); } }
.timer-close {
    background: transparent;
    border: 1px solid rgba(245, 239, 226, 0.18);
    color: var(--cream-dim);
    font-size: 1.15rem;

    line-height: 1;

    align-items: center;

.timer-close:hover { color: var(--cream); border-color: var(--cream); }

/* ===========================================
   THREAD - brand strand along top of each section
   =========================================== */
.thread {
    position: absolute;
    top: 0; left: 0; right: 0;

.thread span:nth-child(2) { background: var(--fund-gold); }

/* Active-year highlight strand */
.year.active .thread span { opacity: 1; }

/* ===========================================

   =========================================== */
@media (max-width: 1400px) {
    .ticker-forever { grid-template-columns: repeat(6, 1fr); }

@media (max-width: 1200px) {

    .ticker-col:nth-child(5), .ticker-col:nth-child(6) { display: none; }

body.paused .archive-plane,
body.paused .marquee-row,

body.paused .forever-col,

function shuffle(arr, seed) {
    const a = arr.slice();
    let s = seed;
    for (let i = a.length - 1; i > 0; i--) {
        s = (s * 9301 + 49297) % 233280;
        const j = Math.floor((s / 233280) * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function resolveImages(y, index) {
    if (y.images && y.images.length > 0) {
        return { base: y.base, list: y.images, demo: false };
    }
    return { base: FALLBACK_BASE, list: FALLBACK_IMAGES, demo: true };
}

/* ============================================================
   SECTION SHELL
   ============================================================ */

function buildShell(y, index, demo) {
    const section = document.createElement('section');
    section.className = 'year';
    section.dataset.index = index;
    section.dataset.year = y.year;
    section.id = 'year-' + y.year;

    section.innerHTML = `
        <div class="thread"><span></span><span></span><span></span></div>
        <div class="year-stage" data-style="${y.style}"></div>
        <div class="year-overlay"></div>
        ${demo ? '<div class="demo-badge">Demo imagery · ' + y.year + ' folder empty</div>' : ''}
        <div class="year-hero">
            <div class="year-center">
                <div class="year-digit">${y.year}</div>
                <h2 class="year-title">${y.title}</h2>
                <p class="year-caption">${y.caption}</p>
                ${y.bullets && y.bullets.length ? `<ul class="year-bullets">${y.bullets.map(b => `<li>${b}</li>`).join('')}</ul>` : ''}
            </div>
        </div>
    `;
    return section;
}

/* ============================================================
   STYLE BUILDERS
   ============================================================ */

// 1. Archive drift (dense collage, archival wash, whole plane drifts)
function buildArchiveDrift(stage, base, images, seed) {
    stage.classList.add('archive-drift');
    const plane = document.createElement('div');
    plane.className = 'archive-plane';
    stage.appendChild(plane);

    const list = shuffle(images, seed);
    // Over-provision so the collage always fills the viewport even on
    // wide/tall screens and after the plane's 110% zoom. The grid is
    // overflow:hidden so excess tiles get clipped harmlessly.
    const TARGET = 80;
    for (let i = 0; i < TARGET; i++) {
        const tile = document.createElement('div');
        tile.className = 'archive-tile';
        const img = document.createElement('img');
        img.src = base + list[i % list.length];
        img.loading = 'eager';
        img.decoding = 'async';
        img.alt = '';
        tile.appendChild(img);
        plane.appendChild(tile);
    }
    return { start() {}, stop() {} };
}

// 2. Marquee rows
function buildMarqueeRows(stage, base, images, seed) {
    stage.classList.add('marquee-rows');
    for (let r = 0; r < 3; r++) {
        const row = document.createElement('div');
        row.className = 'marquee-row r' + (r + 1);
        const order = shuffle(images, seed + r * 31);
        const seq = order.concat(order);
        seq.forEach((name) => {
            const t = document.createElement('div');
            t.className = 'marquee-tile';
            const img = document.createElement('img');
            img.src = base + name;
            img.loading = 'lazy';
            img.alt = '';
            t.appendChild(img);
            row.appendChild(t);
        });
        stage.appendChild(row);
    }
    return { start() {}, stop() {} };
}

// 3. Ticker columns
function buildTickerColumns(stage, base, images, seed) {
    stage.classList.add('ticker-columns');
    for (let c = 0; c < 6; c++) {
        const col = document.createElement('div');
        col.className = 'ticker-col';
        const order = shuffle(images, seed + c * 137 + 11);
        const seq = order.concat(order);
        seq.forEach((name) => {
            const t = document.createElement('div');
            t.className = 'ticker-tile';
            const img = document.createElement('img');
            img.src = base + name;
            img.loading = 'lazy';
            img.alt = '';
            t.appendChild(img);
            col.appendChild(t);
        });
        stage.appendChild(col);
    }
    return { start() {}, stop() {} };
}

// 4. Triptych crossfade
function buildTriptychCrossfade(stage, base, images, seed) {
    stage.classList.add('triptych-crossfade');
    const intervals = [5200, 6400, 4600]; // intentionally desynced
    const panels = [];
    for (let p = 0; p < 3; p++) {
        const panel = document.createElement('div');
        panel.className = 'triptych-panel';
        const list = shuffle(images, seed + p * 97);
        const f1 = document.createElement('div');
        f1.className = 'frame visible';
        f1.style.backgroundImage = `url("${base}${list[0]}")`;
        const f2 = document.createElement('div');
        f2.className = 'frame';
        panel.appendChild(f1);
        panel.appendChild(f2);
        stage.appendChild(panel);
        panels.push({ f1, f2, list, idx: 0, active: 1 });
    }

    let timers = [];
    function swap(pi) {
        const p = panels[pi];
        p.idx = (p.idx + 1) % p.list.length;
        const incoming = p.active === 1 ? p.f2 : p.f1;
        const outgoing = p.active === 1 ? p.f1 : p.f2;
        incoming.style.backgroundImage = `url("${base}${p.list[p.idx]}")`;
        incoming.classList.add('visible');
        outgoing.classList.remove('visible');
        p.active = p.active === 1 ? 2 : 1;
    }

    return {
        start() {
            if (timers.length) return;
            panels.forEach((_, i) => {
                timers.push(setInterval(() => swap(i), intervals[i]));
            });
        },
        stop() {
            timers.forEach(clearInterval);
            timers = [];
        }
    };
}

// 6. Ticker forever (textless coda - always running)
function buildTickerForever(stage, urls, seed) {
    stage.classList.add('ticker-forever');
    const COLS = 8;
    for (let c = 0; c < COLS; c++) {
        const col = document.createElement('div');
        col.className = 'forever-col';
        const order = shuffle(urls, seed + c * 211 + 7);
        const seq = order.concat(order);
        seq.forEach((url) => {
            const t = document.createElement('div');
            t.className = 'forever-tile';
            const img = document.createElement('img');
            img.src = url;
            img.loading = 'lazy';
            img.alt = '';
            t.appendChild(img);
            col.appendChild(t);
        });
        stage.appendChild(col);
    }
    // No-op lifecycle - always running, CSS never gated on .active
    return { start() {}, stop() {} };
}

// 5. Mosaic breathe
function buildMosaicBreathe(stage, base, images, seed) {
    stage.classList.add('mosaic-breathe');
    // Over-provision cells so the mosaic always fills the viewport,
    // even on wide/tall displays and after a browser resize. Grid
    // grid-auto-flow:dense packs them with no gaps; overflow:hidden
    // clips anything beyond the fold.
    const TOTAL = 140;

    const list = shuffle(images, seed);
    const cells = [];
    for (let i = 0; i < TOTAL; i++) {
        const cell = document.createElement('div');
        cell.className = 'mosaic-cell';

        const f1 = document.createElement('div');
        f1.className = 'frame visible';
        f1.style.backgroundImage = `url("${base}${list[i % list.length]}")`;
        f1.style.animationDelay = (i * 0.3) + 's';

        const f2 = document.createElement('div');
        f2.className = 'frame';

        cell.appendChild(f1);
        cell.appendChild(f2);
        stage.appendChild(cell);
        cells.push({ el: cell, f1, f2, index: i, active: 1 });
    }

    // Periodic image swap per cell
    let swapTimer = null;
    let swapCounter = TOTAL;

    function swapOne() {
        const c = cells[Math.floor(Math.random() * cells.length)];
        const nextImg = list[swapCounter % list.length];
        swapCounter++;
        const incoming = c.active === 1 ? c.f2 : c.f1;
        const outgoing = c.active === 1 ? c.f1 : c.f2;
        incoming.style.backgroundImage = `url("${base}${nextImg}")`;
        incoming.classList.add('visible');
        incoming.style.animationDelay = '0s';
        requestAnimationFrame(() => {
            outgoing.classList.remove('visible');
            c.active = c.active === 1 ? 2 : 1;
        });
    }

    return {
        start() {
            if (swapTimer) return;
            swapTimer = setInterval(swapOne, 900);
        },
        stop() {
            clearInterval(swapTimer);
            swapTimer = null;
        }
    };
}

/* ============================================================
   WIRE UP
   ============================================================ */

const main = document.getElementById('main');
const nav  = document.getElementById('nav');
const controllers = [];

YEARS.forEach((y, i) => {
    const { base, list, demo } = resolveImages(y, i);
    const section = buildShell(y, i, demo);
    main.appendChild(section);

    const stage = section.querySelector('.year-stage');
    const seed = y.year;

    let controller;
    switch (y.style) {
        case 'archive-drift':      controller = buildArchiveDrift(stage, base, list, seed);      break;
        case 'marquee-rows':       controller = buildMarqueeRows(stage, base, list, seed);       break;
        case 'ticker-columns':     controller = buildTickerColumns(stage, base, list, seed);     break;
        case 'triptych-crossfade': controller = buildTriptychCrossfade(stage, base, list, seed); break;
        case 'mosaic-breathe':     controller = buildMosaicBreathe(stage, base, list, seed);     break;
    }
    controllers.push({ section, controller, coda: false });

    // Nav dot
    const a = document.createElement('a');
    a.href = '#year-' + y.year;
    a.dataset.target = 'year-' + y.year;
    a.innerHTML = `<span>${y.year}</span>`;
    nav.appendChild(a);
});

/* ============================================================
   CODA - textless ambient section after the last year.
   Pools every unique image across every year (dedup by URL).
   Always running, never gated on IntersectionObserver.
   ============================================================ */
const codaPool = (() => {
    const seen = new Set();
    const urls = [];
    YEARS.forEach((y) => {
        const { base, list } = resolveImages(y, 0);
        list.forEach((name) => {
            const url = base + name;
            if (!seen.has(url)) { seen.add(url); urls.push(url); }
        });
    });
    return urls;
})();

const codaSection = document.createElement('section');
codaSection.className = 'year coda active';
codaSection.dataset.index = YEARS.length;
codaSection.dataset.year = 'coda';
codaSection.id = 'year-coda';
const codaStage = document.createElement('div');
codaStage.className = 'year-stage';
codaSection.appendChild(codaStage);
main.appendChild(codaSection);
const codaController = buildTickerForever(codaStage, codaPool, 9991);
controllers.push({ section: codaSection, controller: codaController, coda: true });

// Nav entry for the coda (infinity glyph)
const codaNav = document.createElement('a');
codaNav.href = '#year-coda';
codaNav.dataset.target = 'year-coda';
codaNav.innerHTML = '<span>&#8734;</span>';
nav.appendChild(codaNav);

/* ============================================================
   NAIROBI 2026 - textless closing collage from the actual room.
   76 photos from the partner meeting itself, mosaic-breathe
   engine for Ken Burns + staggered crossfades.
   ============================================================ */
const NAIROBI_BASE = 'img/nairobi-2026/';
const NAIROBI_IMAGES = Array.from({ length: 76 }, (_, i) =>
    `nairobi-${(i + 1).toString().padStart(2, '0')}.jpg`
);

const nairobiSection = document.createElement('section');
nairobiSection.className = 'year coda active';   // reuse coda styling (textless)
nairobiSection.dataset.index = YEARS.length + 1;
nairobiSection.dataset.year = 'nairobi';
nairobiSection.id = 'year-nairobi';
const nairobiStage = document.createElement('div');
nairobiStage.className = 'year-stage';
nairobiSection.appendChild(nairobiStage);
main.appendChild(nairobiSection);
const nairobiController = buildMosaicBreathe(nairobiStage, NAIROBI_BASE, NAIROBI_IMAGES, 7777);
controllers.push({ section: nairobiSection, controller: nairobiController, coda: true });

// Nav entry (star glyph - 'the room right now')
const nairobiNav = document.createElement('a');
nairobiNav.href = '#year-nairobi';
nairobiNav.dataset.target = 'year-nairobi';
nairobiNav.innerHTML = '<span>&#9733;</span>';
nav.appendChild(nairobiNav);

/* ============================================================
   AUTO-ADVANCE - ambient kiosk mode
   Each year holds for AUTO_ADVANCE.year ms, the coda holds
   for AUTO_ADVANCE.coda ms, then it loops back to 2022.
   Disabled while paused (Space). Bump these values to slow
   the whole cycle down, drop them to speed it up.
   ============================================================ */
const AUTO_ADVANCE = {
    year: 45000,
    coda: 40000,
};

let autoTimer = null;

function scheduleAutoAdvance(sectionIndex) {
    clearTimeout(autoTimer);
    if (document.body.classList.contains('paused')) return;
    // Sections >= YEARS.length are textless (coda + nairobi) and hold
    // for AUTO_ADVANCE.coda. Year sections hold for AUTO_ADVANCE.year.
    const isTextless = sectionIndex >= YEARS.length;
    const delay = isTextless ? AUTO_ADVANCE.coda : AUTO_ADVANCE.year;
    autoTimer = setTimeout(() => {
        const next = (sectionIndex + 1) % SECTION_IDS.length;
        gotoIndex(next);
    }, delay);
}

function cancelAutoAdvance() {
    clearTimeout(autoTimer);
    autoTimer = null;
}

/* Start/stop show helpers - called by Space toggle and Timer start. */
function startShow() {
    document.body.classList.remove('paused');
    controllers.forEach(({ controller, section }) => {
        if (section.classList.contains('active')) {
            controller.start && controller.start();
        }
    });
    document.querySelectorAll('.year').forEach((el) => {
        el.style.animationPlayState = 'running';
    });
    scheduleAutoAdvance(currentIndex());
}
function stopShow() {
    document.body.classList.add('paused');
    controllers.forEach(({ controller }) => controller.stop && controller.stop());
    document.querySelectorAll('.year').forEach((el) => {
        el.style.animationPlayState = 'paused';
    });
    cancelAutoAdvance();
}

/* IntersectionObserver: only the in-view section runs its animation
   AND schedules the next auto-advance. Respects the paused state:
   when paused (before timer starts), sections mark active for nav
   but controllers and auto-advance stay halted. */
const io = new IntersectionObserver((entries) => {
    const isPaused = document.body.classList.contains('paused');
    entries.forEach((e) => {
        const i = parseInt(e.target.dataset.index, 10);
        const c = controllers[i];
        if (e.isIntersecting && e.intersectionRatio > 0.55) {
            const becameActive = !e.target.classList.contains('active');
            e.target.classList.add('active');
            if (!isPaused) {
                c.controller.start && c.controller.start();
                if (becameActive) scheduleAutoAdvance(i);
            }
            // Mark nav regardless of pause state
            document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
            document.querySelector(`.nav a[data-target="year-${e.target.dataset.year}"]`)?.classList.add('active');
        } else {
            e.target.classList.remove('active');
            c.controller.stop && c.controller.stop();
        }
    });
}, { threshold: [0, 0.55, 1] });

controllers.forEach(({ section }) => io.observe(section));

/* Start in paused state - the show kicks in when the timer starts
   (or when Space is pressed). */
document.body.classList.add('paused');

/* Keyboard nav (years + coda + nairobi) */
const SECTION_IDS = YEARS.map(y => 'year-' + y.year).concat(['year-coda', 'year-nairobi']);

function currentIndex() {
    const y = window.scrollY + window.innerHeight * 0.5;
    const i = Math.floor(y / window.innerHeight);
    return Math.max(0, Math.min(SECTION_IDS.length - 1, i));
}
function gotoIndex(i) {
    i = Math.max(0, Math.min(SECTION_IDS.length - 1, i));
    document.getElementById(SECTION_IDS[i]).scrollIntoView({ behavior: 'smooth' });
}

document.addEventListener('keydown', (e) => {
    // Don't hijack keys while typing in an input
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;

    if (e.code === 'ArrowDown' || e.code === 'PageDown') {
        e.preventDefault();
        gotoIndex(currentIndex() + 1);
    } else if (e.code === 'ArrowUp' || e.code === 'PageUp') {
        e.preventDefault();
        gotoIndex(currentIndex() - 1);
    } else if (e.code === 'Home') {
        e.preventDefault(); gotoIndex(0);
    } else if (e.code === 'End') {
        e.preventDefault(); gotoIndex(SECTION_IDS.length - 1);
    } else if (e.code === 'Space') {
        e.preventDefault();
        if (document.body.classList.contains('paused')) {
            startShow();
        } else {
            stopShow();
        }
    } else if (e.key && e.key.toLowerCase() === 'f') {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen?.();
        } else {
            document.exitFullscreen?.();
        }
    } else if (e.key && e.key.toLowerCase() === 't') {
        e.preventDefault();
        openTimerModal();
    } else if (e.code === 'Escape') {
        if (timerModal.classList.contains('active')) closeTimerModal();
    }
});

/* ============================================================
   BREAK TIMER
   ============================================================ */
const timerButton  = document.getElementById('timer-button');
const timerModal   = document.getElementById('timer-modal');
const timerMinutes = document.getElementById('timer-minutes');
const timerStart   = document.getElementById('timer-start');
const timerCancel  = document.getElementById('timer-cancel');
const timerDisplay = document.getElementById('timer-display');
const timerDigits  = document.getElementById('timer-digits');
const timerClose   = document.getElementById('timer-close');

let timerTick = null;
let timerEndTs = null;

function openTimerModal() {
    timerModal.classList.add('active');
    setTimeout(() => { timerMinutes.focus(); timerMinutes.select(); }, 50);
}
function closeTimerModal() {
    timerModal.classList.remove('active');
}

function renderTimer() {
    const remaining = Math.max(0, timerEndTs - Date.now());
    const totalSec = Math.ceil(remaining / 1000);
    const mm = Math.floor(totalSec / 60);
    const ss = totalSec % 60;
    timerDigits.textContent = `${mm}:${ss.toString().padStart(2, '0')}`;

    timerDigits.classList.remove('warning', 'alert', 'done');
    if (remaining === 0) {
        timerDigits.classList.add('done');
        timerDigits.textContent = "TIME'S UP";
        clearInterval(timerTick);
        timerTick = null;
    } else if (totalSec <= 10) {
        timerDigits.classList.add('alert');
    } else if (totalSec <= 60) {
        timerDigits.classList.add('warning');
    }
}

function startTimer(minutes) {
    const ms = Math.max(1, minutes) * 60 * 1000;
    timerEndTs = Date.now() + ms;
    timerDisplay.classList.add('active');
    renderTimer();
    clearInterval(timerTick);
    timerTick = setInterval(renderTimer, 250);
}

function stopTimer() {
    clearInterval(timerTick);
    timerTick = null;
    timerEndTs = null;
    timerDisplay.classList.remove('active');
    timerDigits.classList.remove('warning', 'alert', 'done');
}

timerButton.addEventListener('click', openTimerModal);
timerCancel.addEventListener('click', closeTimerModal);
timerClose .addEventListener('click', stopTimer);
timerStart .addEventListener('click', () => {
    const mins = parseInt(timerMinutes.value, 10);
    if (!mins || mins < 1) return;
    closeTimerModal();
    startTimer(mins);
    // Also kick off the slideshow from 2022 so the break starts cleanly
    gotoIndex(0);
    setTimeout(startShow, 150); // small delay so scroll settles first
});
timerMinutes.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); timerStart.click(); }
});
document.querySelectorAll('.timer-quick button').forEach((btn) => {
    btn.addEventListener('click', () => {
        timerMinutes.value = btn.dataset.mins;
        timerMinutes.focus();
    });
});
timerModal.addEventListener('click', (e) => {
    if (e.target === timerModal) closeTimerModal();
});
</script>
