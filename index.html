<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fund Partners Meeting · April 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="progress-bar"></div>

<div id="hero-bg">
  <div class="bg-layer visible" id="bg-a"></div>
  <div class="bg-layer" id="bg-b"></div>
</div>

<div id="cover-mark">
  <div class="cover-mark-card">
    <img src="assets/mcf-logo.png" alt="Mastercard Foundation" class="mcf-logo">
    <div class="cover-mark-main">Africa Growth Fund</div>
  </div>
</div>

<div id="pinned-mark">
  <img src="assets/mcf-logo.png" alt="" class="pinned-logo">
  <span class="pinned-hashtag">#AfricaGrowthFund</span>
</div>

<div id="acg-cover-mark">
  <div class="acg-eyebrow">Africa Communications Group</div>
  <div class="acg-wordmark">
    <span>AFRICA</span>
    <span>COMMUNICATIONS</span>
    <span>GROUP</span>
  </div>
  <div class="acg-tagline">Communications for Africa's institutional moment.</div>
</div>

<div id="acg-pinned-mark">ACG</div>

<div id="fund-pattern-deco" aria-hidden="true"></div>

<div id="ticker" aria-label="LinkedIn audience growth">
  <div class="ticker-icon">in</div>
  <div class="ticker-body">
    <div class="ticker-top">
      <span class="ticker-num" id="ticker-num">18,997</span>
      <span class="ticker-delta" id="ticker-delta">+0</span>
    </div>
    <div class="ticker-lbl" id="ticker-lbl">The Fund · LinkedIn · Jan 1 2026</div>
  </div>
</div>

<div id="tabs" role="tablist"></div>

<div id="slide-counter">01 / 12</div>

<main id="scroller">
  <div id="slides"></div>
</main>

<div id="timeline-bar" aria-hidden="true"></div>

<div id="dock" aria-hidden="true"></div>

<script src="app.js"></script>
</body>
</html>
